            margin: 0;
            padding: 20px;
            display: flex;

        }

            flex: 1;
            overflow-y: auto;

            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);

            padding: 5px 10px;

            outline: none;
            padding: 5px 0;

            color: #555555;
            font-size: 13px;
            user-select: none;
            pointer-events: none;
            font-family: inherit;

        .color-purple { color: #d05ce3; }
        .color-yellow { color: #f1c40f; }
        .color-blue { color: #3498db; }
        .color-red { color: #e74c3c; }
        .color-green { color: #2ecc71; }
        .color-reset { color: #cccccc; }
    </style>
</head>

        // Helpers to convert color and format terminal text
        function parseColors(text) {
            let html = text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");

            html = html.replace(/\\033\[35m|\x1b\[35m/g, '<span class="color-purple">');
            html = html.replace(/\\033\[33m|\x1b\[33m/g, '<span class="color-yellow">');
            html = html.replace(/\\033\[34m|\x1b\[34m/g, '<span class="color-blue">');
            html = html.replace(/\\033\[31m|\x1b\[31m/g, '<span class="color-red">');
            html = html.replace(/\\033\[32m|\x1b\[32m/g, '<span class="color-green">');
            html = html.replace(/\\033\[0m|\x1b\[0m/g, '</span>');

            return html;
        }

        function print(text = "", colorPrefix = "", colorSuffix = "") {
            let fullText = colorPrefix + text + colorSuffix;
            outputDiv.innerHTML += parseColors(fullText) + "\n";
            terminalContainer.scrollTop = terminalContainer.scrollHeight;
        }

        function clearScreen() {
            outputDiv.innerHTML = "";
        }

        // Wait Helper
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Random Integer generation (inclusive)
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Setup user input listener
        userInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const value = userInput.value;
                userInput.value = '';
                print(value); // Echo back user's typing
                if (inputResolver) {
                    const tempResolve = inputResolver;
                    inputResolver = null;
                    tempResolve(value);
                }
            }
        });

        document.addEventListener('click', () => {
            userInput.focus();
        });

        function getPromptInput(promptText) {
            print(promptText);
            return new Promise((resolve) => {
                inputResolver = resolve;
            });
        }

        // Center function mimicking python .center()
        function centerText(text, width) {
            if (text.length >= width) return text;
            const padTotal = width - text.length;
            const padLeft = Math.floor(padTotal / 2);
            const padRight = padTotal - padLeft;
            return " ".repeat(padLeft) + text + " ".repeat(padRight);
        }

        // Rjust function mimicking python .rjust()
        function rjustText(text, width) {
            if (text.length >= width) return text;
            return " ".repeat(width - text.length) + text;
        }

        // ==========================================
        // VERSION 1.0.0 GAME ENGINE
        // ==========================================
        async function runV1_0_0() {
            const BLUE = "\x1b[34m";
            const RED = "\x1b[31m";
            const GREEN = "\x1b[32m";
            const RESET = "\x1b[0m";

            clearScreen();
            let version_text = "Dice Roller V1.0.0";
            print(rjustText(version_text, 80));

            while (true) {
                let dice_roll = getRandomInt(1, 12);
                print("You rolled a: " + dice_roll);
                let dice_roll_two = getRandomInt(1, 12);
                print("You rolled a: " + dice_roll_two);
                let total = dice_roll + dice_roll_two;
                print("Total: " + total);

                print("Points Gained: " + ((point_gain_multiplier) * point_gain_add + point_gain * total / 4));
                points += point_gain * total / 4;
                print();
                print("Total Points: " + points, GREEN, RESET);
                print("-".repeat(20));

                let reroll = await getPromptInput("Reroll? yes/no/shop/clear");
                print();

                if (reroll === "yes") {
                    print("Rolling Again:");
                } else if (reroll === "no") {
                    break;
                } else if (reroll === "clear") {
                    clearScreen();
                } else if (reroll === "shop") {
                    print("Welcome to the Shop!, what do you want to buy?");
                    print("1. +2 Points per Roll, Cost: " + (ppr_cost * ppr_cost_multiplier));
                    print("2. 1.25x Points per Roll Multiplier, Cost: " + (pprm_cost * pprm_cost_multiplier));
                    let shop = await getPromptInput("What to buy?");
                    print("-".repeat(20));
                    print();

                    if (shop === "1") {
                        let cost = ppr_cost * ppr_cost_multiplier;
                        if (points >= cost) {
                            print("Receipt", BLUE, RESET);
                            print();
                            point_gain_add + 2; 
                            points -= cost;
                            print("Cost: -" + cost, RED, RESET);
                            print("Bought: +2 Points per Roll", RED, RESET);
                            ppr_cost_multiplier += 0.25;
                            print();
                            print("-".repeat(20));
                            print();
                            print("Thank's For Your Purchase!");
                            print();
                        } else {
                            print("Innsufficent Funds", RED, RESET);
                            print("Your Points: " + points, RED, RESET);
                            print("Required Points: " + cost, RED, RESET);
                            print();
                            print("-".repeat(20));
                        }
                    }
                    if (shop === "2") {
                        let cost = pprm_cost * pprm_cost_multiplier;
                        if (points >= cost) {
                            print("Receipt", BLUE, RESET);
                            print();
                            point_gain_multiplier * 1.25;
                            points -= cost;
                            print("Cost: -" + cost, RED, RESET);
                            print("Bought: 1.25x Points Per Roll Multiplier", RED, RESET);
                            pprm_cost_multiplier += 0.5;
                            print();
                            print("-".repeat(20));
                            print();
                            print("Thank's For Your Purchase!");
                            print();
                        } else {
                            print("Innsufficent Funds", RED, RESET);
                            print("Your Points: " + points, RED, RESET);
                            print("Required Points: " + cost, RED, RESET);
                            print();
                            print("-".repeat(20));
                        }
                    }
                }
            }
            print("\nExited Game. Refresh to launch again!");
        }
